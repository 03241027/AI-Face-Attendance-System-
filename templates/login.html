<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - AttendAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">AI</div>
      <div>
        <div class="auth-brand-title">AttendAI</div>
        <div class="auth-brand-sub">Smart attendance console</div>
      </div>
    </div>
    <div class="auth-banner">
      <img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=900&q=80" alt="Modern attendance workspace" />
    </div>
    <h2>Welcome back</h2>
    <p>Sign in to continue to AttendAI.</p>

    {% if message %}
    <div class="message-box success">{{ message }}</div>
    {% endif %}
    {% if error %}
    <div class="message-box error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Your username" required />
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required />
      </div>
      <button type="submit" class="auth-btn">Sign In</button>
    </form>

    <div class="auth-alt">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </div>
    <div class="auth-meta">
      <span>Secure access</span>
      <span>Face recognition ready</span>
    </div>
  </div>
</body>
</html>
